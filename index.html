<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qualiy</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link rel="manifest" href="site.webmanifest" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="android-chrome-192x192.png"
    />
  </head>
  <body>
    <div class="main">
      <img class="imgTitle" src="titelbild3.png" alt="Logo und Titel" />
      <div id="wrapper"></div>
      <div class="coop">
        <a href="coop1.html" class="coopTitle">Stall 1</a>
        <div class="inputBlock">
          <input class="inputField" type="number" placeholder="Eier" />
          <button class="eggBtn" onclick="addEggs()">Speichern</button>
        </div>
        <div class="checkList">
          <button onclick="clean()" class="toDoBtn">Ausmisten</button>
          <button onclick="feed()" class="toDoBtn">Futter und Wasser</button>
          <button onclick="lightOn()" class="toDoBtn">Licht instalieren</button>
          <button onclick="lightOff()" class="toDoBtn">
            Licht deinstalieren
          </button>
        </div>
      </div>
      <button class="addBtn" onclick="addCoop()">Neuer Stall</button>
      <button class="addBtn" onclick="archive()">Archiv</button>
    </div>
  </body>
</html>
